<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <title>HabitFlow 2026</title>
  <desc>HabitFlow 2026 app logo — circular mark with H monogram and flowing arcs</desc>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="99" fill="#0a0a0c" stroke="#1e1b4b" stroke-width="1"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#3730a3" stroke-width="2"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="66" fill="none" stroke="#1e1b4b" stroke-width="1"/>

  <!-- Tick marks -->
  <line x1="100" y1="20" x2="100" y2="27" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(0 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="24" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(30 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="27" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(60 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="24" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(90 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="27" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(120 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="24" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(150 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="27" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(180 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="24" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(210 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="27" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(240 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="24" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(270 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="27" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(300 100 100)"/>
  <line x1="100" y1="20" x2="100" y2="24" stroke="#3730a3" stroke-width="1.5" stroke-linecap="round" transform="rotate(330 100 100)"/>

  <!-- Indigo arc (large sweep) -->
  <path d="M 100 34 A 66 66 0 1 1 34.1 116" fill="none" stroke="#6366f1" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Rose arc (closing sweep) -->
  <path d="M 34.1 116 A 66 66 0 0 1 100 34" fill="none" stroke="#e11d48" stroke-width="3.5" stroke-linecap="round"/>

  <!-- H letter mark -->
  <rect x="76" y="72" width="8" height="56" rx="3" fill="#818cf8"/>
  <rect x="116" y="72" width="8" height="56" rx="3" fill="#818cf8"/>
  <rect x="76" y="96" width="48" height="8" rx="3" fill="#818cf8"/>

  <!-- Rose dot accent -->
  <circle cx="126" cy="131" r="4" fill="#e11d48"/>

  <!-- Spark lines -->
  <line x1="130" y1="82" x2="142" y2="82" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <line x1="130" y1="91" x2="138" y2="91" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
